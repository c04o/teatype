name: ci

# when to run the ci
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      # clone repo in runner
      - uses: actions/checkout@v5

      # install nix
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      # run linter
      - name: Run golangci-lint
        run: nix develop --command golangci-lint run

  test:
    name: test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      # run tests using the go version from flake
      - name: Run Go Tests
        run: nix develop --command go test -v ./...

  build:
    name: build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      # actually build
      - name: compile linux bin
        run: nix develop --command bash -c "GOOS=linux GOARCH=amd64 go build -ldflags=\"-s -w\" -o app main.go"
